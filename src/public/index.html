<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLD 社区门户</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #ff6b6b 0%, #1a1a2e 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <!-- 导航栏 -->
    <nav class="border-b border-white/10 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="text-2xl font-bold text-[#e94560]">HOLD</div>
                <div class="text-sm text-gray-400">社区门户</div>
            </div>
            <div class="flex gap-6 text-sm">
                <a href="#analyze" class="hover:text-[#e94560]">代币分析</a>
                <a href="#wallet" class="hover:text-[#e94560]">钱包诊断</a>
                <a href="#learn" class="hover:text-[#e94560]">知识库</a>
                <a href="#community" class="hover:text-[#e94560]">社区</a>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="max-w-7xl mx-auto px-6 py-12">
        <!-- Hero Section -->
        <section class="text-center py-16">
            <h1 class="text-4xl md:text-6xl font-bold mb-6">
                让 <span class="text-[#e94560]">Holders</span> 学会各种知识
            </h1>
            <p class="text-xl text-gray-400 mb-8 max-w-2xl mx-auto">
                BSC 社区的知识学习平台<br>
                数据驱动 · AI 分析 · 共同成长
            </p>
            <div class="flex justify-center gap-4">
                <button onclick="connectWallet()" class="btn-primary px-8 py-3 rounded-lg font-medium">
                    连接钱包
                </button>
            </div>
        </section>

        <!-- 代币分析区 -->
        <section id="analyze" class="py-16">
            <h2 class="text-2xl font-bold mb-8">代币分析</h2>
            <div class="card rounded-xl p-6">
                <div class="flex gap-4 mb-6">
                    <input
                        type="text"
                        id="tokenAddress"
                        placeholder="输入代币合约地址"
                        class="flex-1 bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-[#e94560]"
                    >
                    <button onclick="analyzeToken()" class="btn-primary px-6 py-3 rounded-lg">
                        分析
                    </button>
                </div>
                <div id="analyzeResult" class="hidden">
                    <!-- 分析结果将在这里显示 -->
                </div>
            </div>
        </section>

        <!-- 钱包诊断区 -->
        <section id="wallet" class="py-16">
            <h2 class="text-2xl font-bold mb-8">钱包诊断</h2>
            <div class="card rounded-xl p-6">
                <div class="flex gap-4 mb-6">
                    <input
                        type="text"
                        id="walletAddress"
                        placeholder="输入钱包地址"
                        class="flex-1 bg-white/10 border border-white/20 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-[#e94560]"
                    >
                    <button onclick="diagnoseWallet()" class="btn-primary px-6 py-3 rounded-lg">
                        诊断
                    </button>
                </div>
                <div id="diagnoseResult" class="hidden">
                    <!-- 诊断结果将在这里显示 -->
                </div>
            </div>
        </section>

        <!-- 知识库 -->
        <section id="learn" class="py-16">
            <h2 class="text-2xl font-bold mb-8">知识库</h2>
            <div class="grid md:grid-cols-3 gap-6">
                <div class="card rounded-xl p-6 hover:border-[#e94560]/50 transition">
                    <div class="text-3xl mb-4">🛡️</div>
                    <h3 class="text-lg font-bold mb-2">安全第一</h3>
                    <p class="text-gray-400 text-sm">学会识别蜜罐、假币、收割套路</p>
                </div>
                <div class="card rounded-xl p-6 hover:border-[#e94560]/50 transition">
                    <div class="text-3xl mb-4">📊</div>
                    <h3 class="text-lg font-bold mb-2">数据分析</h3>
                    <p class="text-gray-400 text-sm">读懂持仓、流动性、交易数据</p>
                </div>
                <div class="card rounded-xl p-6 hover:border-[#e94560]/50 transition">
                    <div class="text-3xl mb-4">🧘</div>
                    <h3 class="text-lg font-bold mb-2">心态修炼</h3>
                    <p class="text-gray-400 text-sm">亏损后如何调整、避免FOMO</p>
                </div>
            </div>
        </section>

        <!-- 社区 -->
        <section id="community" class="py-16">
            <h2 class="text-2xl font-bold mb-8">社区讨论</h2>
            <div class="card rounded-xl p-6">
                <div class="text-center text-gray-400 py-8">
                    <p>即将上线...</p>
                    <p class="text-sm mt-2">一起学习、一起成长</p>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="border-t border-white/10 px-6 py-8 mt-16">
        <div class="max-w-7xl mx-auto text-center text-gray-400 text-sm">
            <p>&copy; 2024 HOLD Community. All rights reserved.</p>
            <p class="mt-2">数据来源: GMGN API | Etherscan | Alchemy</p>
        </div>
    </footer>

    <script>
        // 连接钱包
        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({
                        method: 'eth_requestAccounts'
                    });
                    console.log('Connected:', accounts[0]);
                    alert('钱包已连接: ' + accounts[0].slice(0, 8) + '...');
                } catch (error) {
                    console.error(error);
                    alert('连接失败');
                }
            } else {
                alert('请安装 MetaMask');
            }
        }

        // 分析代币
        async function analyzeToken() {
            const address = document.getElementById('tokenAddress').value;
            if (!address) {
                alert('请输入代币地址');
                return;
            }

            const resultDiv = document.getElementById('analyzeResult');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = '<p class="text-gray-400">分析中...</p>';

            try {
                const response = await fetch(`/api/token/analyze?address=${address}&chain=bsc`);
                const data = await response.json();

                if (data.success) {
                    displayAnalyzeResult(data.data);
                } else {
                    resultDiv.innerHTML = '<p class="text-red-400">分析失败</p>';
                }
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = '<p class="text-red-400">请求失败</p>';
            }
        }

        // 诊断钱包
        async function diagnoseWallet() {
            const address = document.getElementById('walletAddress').value;
            if (!address) {
                alert('请输入钱包地址');
                return;
            }

            const resultDiv = document.getElementById('diagnoseResult');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = '<p class="text-gray-400">诊断中...</p>';

            try {
                const response = await fetch(`/api/wallet/diagnose?address=${address}&chain=bsc`);
                const data = await response.json();

                if (data.success) {
                    displayDiagnoseResult(data.data);
                } else {
                    resultDiv.innerHTML = '<p class="text-red-400">诊断失败</p>';
                }
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = '<p class="text-red-400">请求失败</p>';
            }
        }

        // 显示分析结果
        function displayAnalyzeResult(data) {
            const info = data.info;
            const security = data.security;
            const aiAnalysis = data.aiAnalysis;

            document.getElementById('analyzeResult').innerHTML = `
                <div class="space-y-4">
                    <div class="bg-white/5 rounded-lg p-4">
                        <h3 class="font-bold mb-2">${info.symbol} - ${info.name}</h3>
                        <p class="text-sm text-gray-400">价格: $${info.price} | 流动性: $${info.liquidity}</p>
                    </div>
                    <div class="bg-white/5 rounded-lg p-4">
                        <h3 class="font-bold mb-2">安全评估</h3>
                        <p class="text-sm ${security.data?.is_honeypot ? 'text-red-400' : 'text-green-400'}">
                            ${security.data?.is_honeypot ? '⚠️ 蜜罐警告' : '✅ 无蜜罐风险'}
                        </p>
                    </div>
                    <div class="bg-white/5 rounded-lg p-4">
                        <h3 class="font-bold mb-2">AI 分析</h3>
                        <p class="text-sm text-gray-300 whitespace-pre-wrap">${aiAnalysis}</p>
                    </div>
                </div>
            `;
        }

        // 显示诊断结果
        function displayDiagnoseResult(data) {
            document.getElementById('diagnoseResult').innerHTML = `
                <div class="bg-white/5 rounded-lg p-4">
                    <h3 class="font-bold mb-2">AI 诊断</h3>
                    <p class="text-sm text-gray-300 whitespace-pre-wrap">${data.aiDiagnosis}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
